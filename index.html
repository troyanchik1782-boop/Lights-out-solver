<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lights Out</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:monospace; color:#e0e0e0; padding:16px; }
.panel { background:#1a1a1a; border:2px solid #2a2a2a; border-radius:16px; padding:24px 16px; width:100%; max-width:380px; }
h1 { text-align:center; font-size:18px; letter-spacing:4px; color:#ff4400; text-shadow:0 0 20px rgba(255,68,0,0.6); margin-bottom:4px; }
.sub { text-align:center; font-size:10px; color:#444; letter-spacing:2px; margin-bottom:20px; }
.lights { display:flex; gap:3px; justify-content:center; margin-bottom:8px; }
.light { width:36px; height:36px; border-radius:50%; cursor:pointer; border:2px solid #aa2200; background:radial-gradient(circle at 35% 35%,#ff6644,#cc2200); box-shadow:0 0 8px rgba(255,50,0,0.5); transition:all .15s; flex-shrink:0; }
.light.on { border-color:#22aa00; background:radial-gradient(circle at 35% 35%,#88ff44,#22cc00); box-shadow:0 0 12px rgba(100,255,50,0.9); }
.nums { display:flex; gap:3px; justify-content:center; margin-bottom:18px; }
.num { width:36px; text-align:center; font-size:10px; color:#333; flex-shrink:0; }
.btn { width:100%; padding:12px; border:none; border-radius:8px; font-family:monospace; font-size:12px; letter-spacing:2px; cursor:pointer; margin-bottom:8px; }
.solve { background:linear-gradient(135deg,#cc2200,#ff4400); color:white; font-weight:700; }
.reset { background:transparent; border:1px solid #2a2a2a; color:#444; }
.result { background:#0d0d0d; border:1px solid #1e1e1e; border-radius:10px; padding:16px; margin-top:8px; display:none; }
.steps { display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
.badge { width:36px; height:36px; border-radius:50%; background:radial-gradient(circle at 35% 35%,#88ff44,#22cc00); border:2px solid #22aa00; box-shadow:0 0 10px rgba(100,255,50,0.7); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:#003300; }
.rlabel { font-size:10px; color:#444; letter-spacing:2px; }
.rnote { font-size:11px; color:#555; margin-top:6px; }
.err { color:#ff4400; text-align:center; font-size:12px; }
</style>
</head>
<body>
<div class="panel">
  <h1>LIGHTS OUT</h1>
  <div class="sub">// РЕШАТЕЛЬ //</div>
  <div class="lights" id="lights"></div>
  <div class="nums" id="nums"></div>
  <button class="btn solve" onclick="doSolve()">⚡ РЕШИТЬ</button>
  <button class="btn reset" onclick="doReset()">↺ СБРОСИТЬ</button>
  <div class="result" id="result"></div>
</div>
<script>
const N=8, state=Array(N).fill(0);
function render(){
  const L=document.getElementById('lights');
  L.innerHTML='';
  state.forEach((v,i)=>{
    const b=document.createElement('div');
    b.className='light'+(v?' on':'');
    b.onclick=()=>{state[i]^=1;render();document.getElementById('result').style.display='none';};
    L.appendChild(b);
  });
  const nums=document.getElementById('nums');
  if(!nums.children.length) for(let i=0;i<N;i++){const s=document.createElement('div');s.className='num';s.textContent=i+1;nums.appendChild(s);}
}
function press(s,i){const ns=[...s];ns[i]^=1;ns[(i-1+N)%N]^=1;ns[(i+1)%N]^=1;return ns;}
function doSolve(){
  for(let mask=0;mask<256;mask++){
    let s=[...state];
    for(let i=0;i<N;i++) if(mask&(1<<i)) s=press(s,i);
    if(s.every(v=>v===1)){
      const p=[];for(let i=0;i<N;i++) if(mask&(1<<i)) p.push(i+1);
      showResult(p);return;
    }
  }
  const r=document.getElementById('result');
  r.innerHTML='<div class="err">✗ Решения нет — нажми RESET в игре</div>';
  r.style.display='block';
}
function showResult(p){
  const r=document.getElementById('result');
  if(!p.length){r.innerHTML='<div style="color:#22cc00;text-align:center">✓ Уже всё зелёное!</div>';}
  else{r.innerHTML=`<div class="rlabel">► НАЖАТЬ:</div><div class="steps">${p.map(x=>`<div class="badge">${x}</div>`).join('')}</div><div class="rnote">${p.join(' → ')}</div>`;}
  r.style.display='block';
}
function doReset(){state.fill(0);render();document.getElementById('result').style.display='none';}
render();
</script>
</body>
</html>
